version: '3.8'

services:
  # --- Banco de Dados Relacional (Histórico de Manutenção e MLFlow) ---
  db:
    image: postgres:15-alpine
    container_name: xetroc-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Banco de Dados Vetorial (Normas Técnicas) ---
  qdrant:
    image: qdrant/qdrant:v1.12.0 # Versão fixada e estável
    container_name: xetroc-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # --- Orquestração de Fluxos (Prefect Server) ---
  prefect:
    image: prefecthq/prefect:3-python3.10
    container_name: xetroc-prefect
    restart: always
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////root/.prefect/prefect.db
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    command: prefect server start
    healthcheck: # Regra 7 - Robust Healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:4200/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- MLOps (Experiment Tracking com MLFlow) ---
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    container_name: xetroc-mlflow
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./artifacts/mlflow:/mlflow/artifacts
    command: >
      mlflow server 
      --backend-store-uri postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
    healthcheck: # Regra 7 - MLFlow Healthcheck Ajustado
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  qdrant_data:
  prefect_data:
